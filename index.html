<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<head>
  <link rel="icon" type="image/png" href="assets/icons/cat.png">
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>bvunt.site</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="assets/wallpaper/HoneyWork.mp4" type="video/mp4">
</video>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
#bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -3;
  pointer-events: none;
}

:root {
  --bg:         #070b18; 
  --bg2:        #111a33; 

  --card:       rgba(255, 255, 255, 0.08);

  --btn-bg:     rgba(255, 255, 255, 0.07);
  --btn-hover:  rgba(255, 255, 255, 0.12);

  --accent:     #f6e7a6;
  --accent2:    #ffd36b; 

  --text:       #f6e7a6; 
  --muted:      #ffd36b; 

  --a05:  color-mix(in srgb, var(--accent) 5%,  transparent);
  --a08:  color-mix(in srgb, var(--accent) 8%,  transparent);
  --a10:  color-mix(in srgb, var(--accent) 10%, transparent);
  --a12:  color-mix(in srgb, var(--accent) 12%, transparent);
  --a15:  color-mix(in srgb, var(--accent) 15%, transparent);
  --a18:  color-mix(in srgb, var(--accent) 18%, transparent);
  --a20:  color-mix(in srgb, var(--accent) 20%, transparent);
  --a25:  color-mix(in srgb, var(--accent) 25%, transparent);
  --a28:  color-mix(in srgb, var(--accent) 28%, transparent);
  --a30:  color-mix(in srgb, var(--accent) 30%, transparent);
  --a35:  color-mix(in srgb, var(--accent) 35%, transparent);
  --a40:  color-mix(in srgb, var(--accent) 40%, transparent);
  --a50:  color-mix(in srgb, var(--accent) 50%, transparent);
  --a55:  color-mix(in srgb, var(--accent) 55%, transparent);
  --a60:  color-mix(in srgb, var(--accent) 60%, transparent);
  --a70:  color-mix(in srgb, var(--accent) 70%, transparent);
  --a80:  color-mix(in srgb, var(--accent) 80%, transparent);
  --a90:  color-mix(in srgb, var(--accent) 90%, transparent);
  --a99:  color-mix(in srgb, var(--accent) 99%, transparent);

  --acc:  color-mix(in srgb, var(--accent) 80%, transparent);
}

html { height: 100%; }

body {
  font-family: 'Poppins', sans-serif;
  background: #3a1d2e;
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  overflow: hidden;
  perspective: 1200px;
}

body.is-desktop,
body.is-desktop a,
body.is-desktop button { cursor: none !important; }

#bg-tint {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background:
    radial-gradient(ellipse 900px 700px at 15% 20%, rgba(255, 170, 210, 0.30), transparent 60%),
    radial-gradient(ellipse 800px 900px at 85% 75%, rgba(120, 200, 230, 0.28), transparent 60%),
    radial-gradient(ellipse 1200px 1200px at 50% 100%, rgba(90, 40, 65, 0.45), transparent 70%),
    linear-gradient(160deg, rgba(120, 50, 85, 0.55) 0%, rgba(58, 29, 46, 0.6) 55%, rgba(35, 16, 28, 0.7) 100%);
}

#rain-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.75;
}

.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.orb1 { width: 600px; height: 600px; top: -200px; left: -180px; background: radial-gradient(circle, var(--a30) 0%, transparent 65%); }
.orb2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: radial-gradient(circle, var(--a15) 0%, transparent 65%); }
.orb3 { width: 300px; height: 300px; top: 40%; left: 60%; background: radial-gradient(circle, var(--a10) 0%, transparent 70%); }

#enter-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 9999;
}
#enter-screen.hidden {
  opacity: 0;
  visibility: hidden;
}

.enter-typewriter {
  font-family: 'Poppins', sans-serif;
  font-size: 2rem;
  font-weight: 300;
  color: var(--accent);
  letter-spacing: 0.15em;
  animation: pulseGlow 2s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%, 100% {
    text-shadow:
      0 0 5px var(--accent),
      0 0 10px var(--accent),
      0 0 20px var(--accent);
  }
  50% {
    text-shadow:
      0 0 10px var(--accent),
      0 0 25px var(--accent),
      0 0 50px var(--accent),
      0 0 80px var(--accent);
  }
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

#tilt-wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 640px;
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateY(0deg);
  transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  opacity: 0;
}
#tilt-wrapper.visible {
  opacity: 1;
  transition: opacity 0.8s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}
#tilt-wrapper.tilting { transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1); }

.card {
  background: linear-gradient(
    160deg,
    var(--a20),
    var(--a12)
  );

  border: 1px solid var(--a25);

  backdrop-filter: blur(28px) saturate(140%);
  -webkit-backdrop-filter: blur(28px) saturate(140%);

  border-radius: 26px;
  padding: 2.6rem 2.2rem 1.7rem;

  text-align: left;
  position: relative;
  isolation: isolate;

  box-shadow:
    0 20px 70px rgba(0, 0, 0, 0.5),
    0 1px 0 var(--a10) inset;

  transition: box-shadow 0.4s ease;
  overflow: hidden;
}

@media (max-width: 480px) {
  html, body { height: 100%; height: 100dvh; overflow-y: auto; }
  body { align-items: center; justify-content: center; padding: 1rem; }
  #tilt-wrapper { width: 100%; max-width: 100%; }
  .card { padding: 1.2rem 1.3rem; border-radius: 22px; width: 100%; }
  .avatar { width: 60px; height: 60px; }
  .username { font-size: 1.35rem; }
  .bio { font-size: 0.9rem; }
  .sp-title { font-size: 0.75rem; }
  .sp-art { width: 36px; height: 36px; }
  .sp-btn.play { width: 30px; height: 30px; }
  .sp-btn.play svg { width: 13px; height: 13px; }
  .sp-btn svg { width: 15px; height: 15px; }
  .icon-btn { width: 44px; height: 44px; }
}

@media (min-width: 481px) and (max-height: 780px) {
  .card { padding: 1.6rem 2rem; }
  .avatar { width: 72px; height: 72px; }
  .header-row { margin-bottom: 0.7rem; }
  .username { font-size: 1.35rem; min-height: 1.6rem; }
  .handle { font-size: 0.7rem; margin-bottom: 0.6rem; }
  .bio { font-size: 0.88rem; margin-bottom: 0.8rem; }
  .badges { margin-bottom: 0.8rem; gap: 4px; }
  .divider { margin: 0.6rem 0; }
  .spotify-bar { padding: 9px 11px; margin-bottom: 0.7rem; }
  .sp-art { width: 36px; height: 36px; }
  .sp-label { font-size: 0.55rem; }
  .sp-title { font-size: 0.76rem; }
  .sp-artist { font-size: 0.62rem; }
  .sp-progress-wrap { margin-top: 5px; }
  .links { gap: 9px; padding-top: 5px; }
  .icon-btn { width: 42px; height: 42px; }
  .views { margin-top: 0.8rem; }
}

@media (min-width: 481px) and (max-height: 640px) {
  .card { padding: 1.1rem 1.6rem; }
  .avatar { width: 60px; height: 60px; }
  .header-row { margin-bottom: 0.5rem; }
  .username { font-size: 1.15rem; min-height: 1.4rem; }
  .handle { font-size: 0.65rem; margin-bottom: 0.4rem; }
  .bio { font-size: 0.8rem; margin-bottom: 0.6rem; min-height: 1.4rem; }
  .badges { margin-bottom: 0.6rem; }
  .badge { font-size: 0.6rem; padding: 2px 8px; }
  .divider { margin: 0.4rem 0; }
  .spotify-bar { padding: 7px 9px; margin-bottom: 0.5rem; gap: 8px; }
  .sp-art { width: 30px; height: 30px; }
  .sp-btn.play { width: 28px; height: 28px; }
  .sp-btn.play svg { width: 12px; height: 12px; }
  .sp-btn svg { width: 14px; height: 14px; }
  .sp-progress-wrap { margin-top: 4px; }
  .links { gap: 7px; padding-top: 4px; }
  .icon-btn { width: 38px; height: 38px; border-radius: 11px; }
  .views { margin-top: 0.5rem; font-size: 0.6rem; }
}

@media (max-width: 480px) {
  .icon-btn:active, .icon-btn.touch-hover { color: var(--accent); transform: translateY(-4px) scale(1.35); }
  .icon-btn:active svg, .icon-btn.touch-hover svg { filter: drop-shadow(0 0 10px var(--accent)) drop-shadow(0 0 22px var(--a99)); }
  .icon-btn:active .img-wrap, .icon-btn.touch-hover .img-wrap { filter: drop-shadow(0 0 10px var(--accent)) drop-shadow(0 0 22px var(--a99)); }
  .icon-btn:active .icon-mask, .icon-btn.touch-hover .icon-mask { background-color: var(--accent); opacity: 1; }
}

.card.glow {
  box-shadow: 0 0 60px var(--a28), 0 0 120px var(--a08),
              0 20px 70px #00000080, 0 2px 0 var(--a10) inset;
}

@supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
  .card { background: rgba(10, 4, 18, 0.88); }
}

.volume-ctrl {
  position: fixed;
  top: 16px;
  left: 16px;
  display: flex;
  align-items: center;
  z-index: 200;
  background: transparent;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  width: 42px;
  height: 42px;
  overflow: hidden;
  transition: width 0.38s cubic-bezier(0.34, 1.15, 0.64, 1);
  box-shadow:
    0 4px 24px rgba(0, 0, 0, 0.45),
    0 0 0 1px var(--a12) inset,
    0 0 18px var(--a10);
}

.volume-ctrl:hover {
  width: 172px;
}

.volume-ctrl:focus-within:not(:hover) {
  width: 42px;
}

@keyframes volPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.35); }
  100% { transform: scale(1); }
}

.vol-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
  width: 42px;
  height: 42px;
  min-width: 42px;
  pointer-events: auto;
  cursor: pointer;
}

.vol-icon.pop {
  animation: volPop 220ms cubic-bezier(0.2, 1.4, 0.6, 1);
}
.vol-icon svg { display: block; width: 19px; height: 19px; }

.vol-slider-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  padding-right: 16px;
  opacity: 0;
  transform: translateX(-10px);
  transition:
    opacity 0.22s ease 0.08s,
    transform 0.32s cubic-bezier(0.34, 1.15, 0.64, 1) 0.06s;
  pointer-events: none;
  white-space: nowrap;
}

.volume-ctrl:hover .vol-slider-wrap,
.volume-ctrl:focus-within .vol-slider-wrap {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 99px;
  background: linear-gradient(
    to right,
    var(--accent) var(--val, 80%),
    rgba(255, 255, 255, 0.13) var(--val, 80%)
  );
  outline: none;
  touch-action: none;
  cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px var(--a60), 0 1px 4px rgba(0,0,0,0.5);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.vol-slider::-webkit-slider-thumb:hover {
  transform: scale(1.25);
  box-shadow: 0 0 12px var(--a80);
}
.vol-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  border: none;
  box-shadow: 0 0 8px var(--a60);
}

@media (max-width: 480px) {
  .volume-ctrl { top: 12px; right: 12px; width: 38px; height: 38px; }
  .volume-ctrl:hover, .volume-ctrl:focus-within { width: 154px; }
  .vol-icon { width: 38px; height: 38px; min-width: 38px; }
  .vol-icon svg { width: 17px; height: 17px; }
}

.header-row {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 0.9rem;
}

.header-text { flex: 1; min-width: 0; padding-top: 0.2rem; }

.name-line { display: flex; align-items: center; gap: 8px; margin-bottom: 0.2rem; }

.owner-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #4a1530; flex-shrink: 0;
  box-shadow: 0 0 10px var(--a40);
}
.owner-badge svg { width: 13px; height: 13px; display: block; }

.username-wrap { position: relative; display: inline-block; cursor: default; }

.avatar-wrap { position: relative; display: inline-block; flex-shrink: 0; }
.avatar {
  width: 72px; height: 72px; border-radius: 50%;
  border: 2px solid var(--accent);
  object-fit: cover;
  box-shadow: 0 0 28px var(--a55);
  display: block;
}
.status-dot {
  position: absolute; bottom: 2px; right: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--card);
  box-shadow: 0 0 10px var(--a80);
}

.username {
  font-size: 1.5rem; font-weight: 400; display: inline-block;
  color: var(--text);
  min-height: 1.7rem; letter-spacing: 0.01em;
}
.username .name-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--accent); margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}

.handle { font-family: 'Poppins', sans-serif; font-weight: 500; font-size: 0.74rem; color: var(--muted); }

.bio {
  font-size: 0.92rem; font-weight: 600; line-height: 1.5;
  margin-bottom: 0.3rem; min-height: 1.4rem; text-align: left;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--muted), var(--accent));
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradshift 4s linear infinite;
}
@keyframes gradshift { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
.bio .cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--accent) !important; margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
  -webkit-text-fill-color: initial; background-clip: initial !important; -webkit-background-clip: initial !important;
}

.badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-start; margin-bottom: 0.8rem; }
.badge {
  font-family: 'Poppins', sans-serif; font-weight: 500; font-size: 0.65rem;
  padding: 4px 11px; border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12); color: var(--muted);
  background: rgba(255, 255, 255, 0.06);
}
.badge.special {
  border-color: var(--a40); color: var(--accent2);
  background: linear-gradient(135deg, var(--a12), var(--a08));
}

.divider { height: 1px; background: linear-gradient(90deg, transparent, var(--a25), transparent); margin: 0.6rem 0; }

.spotify-bar {
  background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px; padding: 10px 14px; margin-bottom: 0.6rem;
  display: flex; align-items: center; gap: 12px;
}

.sp-art {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,255,255,0.10);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 18px; overflow: hidden; position: relative;
}
.sp-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; display: none; }
.sp-art img.loaded { display: block; }
.sp-art img.loaded + .sp-art-emoji { display: none; }

.sp-info { flex: 1; text-align: left; overflow: hidden; }
.sp-title  { font-size: 0.82rem; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-artist { font-family: 'Poppins', sans-serif; font-size: 0.68rem; color: var(--muted); }
.sp-label  { font-family: 'Poppins', sans-serif; font-weight: 500; font-size: 0.6rem; color: var(--accent); margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
.sp-dot    { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: spdot 1.5s ease infinite; flex-shrink: 0; }
@keyframes spdot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.6); } }

.sp-progress-wrap { margin-top: 8px; display: flex; align-items: center; gap: 6px; }
.sp-time { font-family: 'Poppins', sans-serif; font-size: 0.55rem; color: var(--muted); flex-shrink: 0; width: 28px; }
.sp-time.right { text-align: right; }

.sp-progress {
  flex: 1; height: 6px; background: #ffffff15;
  border-radius: 99px; overflow: visible; position: relative; touch-action: none;
}
.sp-progress-inner { position: relative; width: 100%; height: 100%; border-radius: 99px; overflow: hidden; }
.sp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px; width: 0%;
  transition: width 0.3s linear; pointer-events: none;
}
.sp-fill.seeking { transition: none; }

.sp-thumb {
  position: absolute; top: 50%; right: -6px;
  width: 12px; height: 12px; border-radius: 50%;
  background: #fff; transform: translateY(-50%) scale(0);
  transition: transform 0.15s ease; pointer-events: none;
  box-shadow: 0 0 6px var(--a80);
}
.sp-progress:hover .sp-thumb,
.sp-progress.dragging .sp-thumb { transform: translateY(-50%) scale(1); }
.sp-progress.dragging .sp-fill  { transition: none; }

.sp-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.sp-btn {
  background: transparent; border: none; color: var(--muted); padding: 6px;
  transition: color 0.2s, transform 0.15s; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.sp-btn:hover, .sp-btn:active { color: var(--text); transform: scale(1.15); }
.sp-btn svg { width: 18px; height: 18px; display: block; }

.sp-btn.play {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000;
  padding: 0;
}
.sp-btn.play svg { width: 16px; height: 16px; }
.sp-btn.play:hover, .sp-btn.play:active {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  transform: scale(1.1);
}

.links {
  display: flex; flex-direction: row;
  justify-content: center; align-items: center;
  gap: 10px; flex-wrap: wrap;
  overflow: visible;
  padding-top: 2px;
  padding-bottom: 1.8rem;
}

.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 14px;
  background: transparent; border: none;
  color: var(--muted); text-decoration: none; font-size: 20px;
  transition: color 0.2s, transform 0.2s, filter 0.2s;
  position: relative; overflow: visible;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.icon-btn svg {
  width: 24px; height: 24px; display: block; flex-shrink: 0; fill: currentColor;
  filter: drop-shadow(0 0 px var(--a40));
  transition: filter 0.2s;
}
.icon-btn:hover, .icon-btn:active { color: var(--accent); transform: translateY(-4px) scale(1.35); }
.icon-btn:hover svg, .icon-btn:active svg { filter: drop-shadow(0 0 6px var(--accent)) drop-shadow(0 0 12px var(--a60)); }

.img-wrap {
  display: flex; align-items: center; justify-content: center;
  transition: filter 0.2s;
  filter: drop-shadow(0 0 px var(--a40));
}
.img-wrap img { display: none; }
.icon-mask {
  width: 24px; height: 24px;
  display: block;
  background-color: var(--muted);
  opacity: 0.85;
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
  transition: background-color 0.2s, opacity 0.2s;
}
#icon-vrchat {
  -webkit-mask-image: url('assets/logos/vrchat.png');
  mask-image: url('assets/logos/vrchat.png');
}
#icon-roblox {
  -webkit-mask-image: url('assets/logos/roblox.png');
  mask-image: url('assets/logos/roblox.png');
}
.icon-btn:hover .img-wrap, .icon-btn:active .img-wrap { filter: drop-shadow(0 0 10px var(--accent)) drop-shadow(0 0 22px var(--a99)); }
.icon-btn:hover .icon-mask, .icon-btn:active .icon-mask { background-color: var(--accent); opacity: 1; }

.views { position: absolute; bottom: 16px; left: 22px; }

.views-bubble {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent;
  border: none; border-radius: 0;
  padding: 0; opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: none;
  position: relative; overflow: visible;
}
.views-bubble::before { content: none; }
.views-bubble.loaded { opacity: 1; transform: translateY(0); }

.views-dot {

#cursor-dot, #cursor-ring { display: none; }
body.is-desktop #cursor-dot,
body.is-desktop #cursor-ring { display: block; }

#cursor-dot {
  position: fixed; top: 0; left: 0;

.trail-dot {

}

.spark {

@keyframes spark-fly {

  100% { opacity: 0; transform: var(--tx) scale(0); }
}

<script>
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
document.body.classList.add(isMobile ? 'is-mobile' : 'is-desktop');

(function() {
  const canvas = document.getElementById('rain-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  const STAR_COUNT = isMobile ? 110 : 220;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  function randBetween(a, b) { return a + Math.random() * (b - a); }
  function createStar() {
    return {
      x: randBetween(0, W),
      y: randBetween(0, H),
      r: randBetween(0.4, 1.8),
      baseOpacity: randBetween(0.25, 0.9),
      phase: randBetween(0, Math.PI * 2),
      speed: randBetween(0.4, 1.4)
    };
  }
  for (let i = 0; i < STAR_COUNT; i++) stars.push(createStar());

  let t = 0;
  function drawStars() {
    ctx.clearRect(0, 0, W, H);
    t += 0.016;
    stars.forEach(s => {
      const twinkle = 0.55 + 0.45 * Math.sin(t * s.speed + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 235, 245, ${s.baseOpacity * twinkle})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

function animateCount(el, target) {
  const duration = 1200, start = performance.now(), startVal = 0;
  function step(now) {
    const elapsed = now - start, progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(startVal + (target - startVal) * ease).toLocaleString();
    if (progress < 1) requestAnimationFrame(step); else el.textContent = target.toLocaleString();
  }
  requestAnimationFrame(step);
}

function fetchVisitCount() {
  fetch('https://bvunt-counter.ember-sys-root.workers.dev', { credentials: 'include' })
    .then(res => res.json())
    .then(data => { animateCount(document.getElementById('views-num'), data.count); document.getElementById('views-count').classList.add('loaded'); })
    .catch(() => { document.getElementById('views-num').textContent = '—'; document.getElementById('views-count').classList.add('loaded'); });
}

const TRACKS = [
  { title: "私は、わたしの事が好き", artist: "HoneyWorks · Kaguya(cv.Yuko Natsuyoshi)", src: "assets/songs/song8.mp3", img: "assets/covers/song8.png", emoji: "🎵" },
  { title: "demo #6 (it's nice to know you)", artist: "wifiskeleton", src: "assets/songs/song6.mp3", img: "assets/covers/song6.png", emoji: "🎵" },
  { title: "2008", artist: "wifiskeleton", src: "assets/songs/song7.mp3", img: "assets/covers/song7.jpg", emoji: "🎵" },
  { title: "fukk rapping bru", artist: "*67", src: "assets/songs/song1.mp3", img: "assets/covers/song1.jpg", emoji: "🎵" },
  { title: "I'm Still Cheering For The 1980 U.S. Hockey Team", artist: "Oakwood", src: "assets/songs/song.mp3", img: "assets/covers/song.jpg", emoji: "🎵" },
  { title: "my little pony", artist: "Fried By Fluoride", src: "assets/songs/song2.mp3", img: "assets/covers/song2.jpg", emoji: "🎵" },
  { title: "I Need Caffeine", artist: "Negative XP", src: "assets/songs/song3.mp3", img: "assets/covers/song3.jpg", emoji: "🎵" },
  { title: "wish i could feel my brain", artist: "wifiskeleton", src: "assets/songs/song4.mp3", img: "assets/covers/song4.jpg", emoji: "🎵" },
  { title: "mi amor", artist: "keepsecrets, witchbox", src: "assets/songs/song5.mp3", img: "assets/covers/song5.jpg", emoji: "🎵" }
];

const BIO_PHRASES = ["i use nixos btw", "something random i think", "songs here are songs from my playlist btw"];

function fmtTime(s) {
  if (!isFinite(s) || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

let current = 0, playing = false, progTimer = null;
const audio      = document.getElementById('audio');
const spPlay     = document.getElementById('sp-play');
const playIcon   = document.getElementById('play-icon');
const card       = document.getElementById('card');
const wrapper    = document.getElementById('tilt-wrapper');
const spFill     = document.getElementById('sp-fill');
const spProg     = document.getElementById('sp-progress');
const spCurEl    = document.getElementById('sp-time-cur');
const spDurEl    = document.getElementById('sp-time-dur');
const spArtImg   = document.getElementById('sp-art-img');
const spArtEmoji = document.getElementById('sp-art-emoji');

const PLAY_PATH  = '<path d="M8 5v14l11-7z"/>';
const PAUSE_PATH = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

const volSlider = document.getElementById('vol-slider');
audio.volume = 0.8;

const VOL_ICONS = {
  mute: `<path d="M24 6v36c-7 0-12.201-9.16-12.201-9.16H6a2 2 0 0 1-2-2V17.01a2 2 0 0 1 2-2h5.799S17 6 24 6Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
         <path d="M34 16L44 32M44 16L34 32" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>`,
  low:  `<path d="M24 6v36c-7 0-12.201-9.16-12.201-9.16H6a2 2 0 0 1-2-2V17.01a2 2 0 0 1 2-2h5.799S17 6 24 6Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
         <path d="M32 18c2.2 2.2 2.2 9.8 0 12" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>`,
  mid:  `<path d="M24 6v36c-7 0-12.201-9.16-12.201-9.16H6a2 2 0 0 1-2-2V17.01a2 2 0 0 1 2-2h5.799S17 6 24 6Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
         <path d="M32 15a11.91 11.91 0 0 1 1.684 1.859A12.07 12.07 0 0 1 36 24c0 2.654-.846 5.107-2.278 7.09A11.936 11.936 0 0 1 32 33" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>`,
  high: `<path d="M24 6v36c-7 0-12.201-9.16-12.201-9.16H6a2 2 0 0 1-2-2V17.01a2 2 0 0 1 2-2h5.799S17 6 24 6Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
         <path d="M32 15a11.91 11.91 0 0 1 1.684 1.859A12.07 12.07 0 0 1 36 24c0 2.654-.846 5.107-2.278 7.09A11.936 11.936 0 0 1 32 33" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
         <path d="M34.236 41.186C40.084 37.696 44 31.305 44 24c0-7.192-3.796-13.496-9.493-17.02" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>`,
};
const volSvg = document.getElementById('vol-svg');

function updateVolIcon(v) {
  if (v === 0)       { volSvg.setAttribute('viewBox', '0 0 48 48'); volSvg.innerHTML = VOL_ICONS.mute; }
  else if (v < 0.35) { volSvg.setAttribute('viewBox', '0 0 48 48'); volSvg.innerHTML = VOL_ICONS.low; }
  else if (v < 0.7)  { volSvg.setAttribute('viewBox', '0 0 48 48'); volSvg.innerHTML = VOL_ICONS.mid; }
  else               { volSvg.setAttribute('viewBox', '0 0 48 48'); volSvg.innerHTML = VOL_ICONS.high; }
}

const volIcon = document.getElementById('vol-icon');

volIcon.addEventListener('click', (e) => {
  e.stopPropagation();

  volIcon.classList.remove('pop');
  void volIcon.offsetWidth;
  volIcon.classList.add('pop');

  audio.muted = !audio.muted;
  if (audio.muted) {
    lastVolume = audio.volume || lastVolume;
    updateVolIcon(0);
  } else {
    audio.volume = lastVolume;
    volSlider.value = lastVolume * 100;
    volSlider.style.setProperty('--val', (lastVolume * 100) + '%');
    updateVolIcon(lastVolume);
  }
});
volSlider.addEventListener('input', () => {
  const v = volSlider.value / 100;

  audio.volume = v;
  audio.muted = v === 0;

  volSlider.style.setProperty('--val', volSlider.value + '%');
  updateVolIcon(v);

  if (v > 0) lastVolume = v;
});

let lastVolume = audio.volume;

const volCtrl = document.getElementById('volume-ctrl');

volCtrl.addEventListener('click', (e) => {
  if (e.target.id === 'vol-slider') return;

  audio.muted = !audio.muted;

  if (audio.muted) {
    lastVolume = audio.volume;
    updateVolIcon(0);
  } else {
    audio.volume = lastVolume;
    volSlider.value = lastVolume * 100;
    volSlider.style.setProperty('--val', (lastVolume * 100) + '%');
    updateVolIcon(lastVolume);
  }
});

function loadTrack(i) {
  const t = TRACKS[i];
  document.getElementById('sp-title').textContent  = t.title;
  document.getElementById('sp-artist').textContent = t.artist;
  audio.src = t.src;
  spFill.style.width = '0%'; spCurEl.textContent = '0:00'; spDurEl.textContent = '0:00';
  if (t.img) {
    spArtImg.src = t.img;
    spArtImg.onload  = () => spArtImg.classList.add('loaded');
    spArtImg.onerror = () => { spArtImg.classList.remove('loaded'); spArtEmoji.textContent = t.emoji; };
    spArtImg.classList.remove('loaded');
  } else { spArtImg.src = ''; spArtImg.classList.remove('loaded'); spArtEmoji.textContent = t.emoji; }
}

audio.addEventListener('loadedmetadata', () => { spDurEl.textContent = fmtTime(audio.duration); });

function setPlaying(s) {
  playing = s;
  playIcon.innerHTML = s ? PAUSE_PATH : PLAY_PATH;
  document.getElementById('sp-status').textContent = s ? 'listening now' : 'paused';
  if (s) { startProg(); card.classList.add('glow'); }
  else   { clearInterval(progTimer); card.classList.remove('glow'); }
}

function startProg() {
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    if (!isDragging && audio.duration) {
      const pct = audio.currentTime / audio.duration * 100;
      spFill.style.width = pct + '%';
      spCurEl.textContent = fmtTime(audio.currentTime);
      spDurEl.textContent = fmtTime(audio.duration);
    }
  }, 250);
}

spPlay.addEventListener('click', () => { playing ? audio.pause() : audio.play().catch(() => {}); setPlaying(!playing); });
document.getElementById('sp-prev').addEventListener('click', () => { current = (current - 1 + TRACKS.length) % TRACKS.length; loadTrack(current); if (playing) audio.play().catch(() => {}); });
document.getElementById('sp-next').addEventListener('click', () => { current = (current + 1) % TRACKS.length; loadTrack(current); if (playing) audio.play().catch(() => {}); });
loadTrack(0);

let isDragging = false;

function seekTo(clientX) {
  const rect = spProg.getBoundingClientRect();
  let pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  if (audio.duration) { audio.currentTime = pct * audio.duration; spFill.style.width = (pct * 100) + '%'; spCurEl.textContent = fmtTime(audio.currentTime); }
}

spProg.addEventListener('mousedown', (e) => { isDragging = true; spProg.classList.add('dragging'); spFill.classList.add('seeking'); seekTo(e.clientX); });
window.addEventListener('mousemove', (e) => { if (isDragging) seekTo(e.clientX); });
window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; spProg.classList.remove('dragging'); spFill.classList.remove('seeking'); } });

spProg.addEventListener('touchstart', (e) => { isDragging = true; spProg.classList.add('dragging'); spFill.classList.add('seeking'); seekTo(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
window.addEventListener('touchmove', (e) => { if (isDragging) { seekTo(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchend', () => { if (isDragging) { isDragging = false; spProg.classList.remove('dragging'); spFill.classList.remove('seeking'); } });

const usernameEl = document.getElementById('username');
const NAME = 'bvunt';
function typeUsername() {
  const cursor = usernameEl.querySelector('.name-cursor') || (() => { const c = document.createElement('span'); c.className = 'name-cursor'; return c; })();
  let i = 0;
  function typeIn() {
    if (i <= NAME.length) { usernameEl.textContent = NAME.slice(0, i); usernameEl.appendChild(cursor); i++; setTimeout(typeIn, 110); }
    else { setTimeout(deleteOut, 1600); }
  }
  function deleteOut() {
    const cur = usernameEl.textContent.replace('|', '').length;
    if (cur > 0) { usernameEl.textContent = NAME.slice(0, cur - 1); usernameEl.appendChild(cursor); setTimeout(deleteOut, 60); }
    else { i = 0; setTimeout(typeIn, 400); }
  }
  typeIn();
}

const bioEl = document.getElementById('bio');
let phraseIndex = 0;
const bioText = document.createElement('span');
bioText.id = 'bio-text';
bioEl.insertBefore(bioText, bioEl.querySelector('.cursor'));
function typeIn() {
  const line = BIO_PHRASES[phraseIndex];
  if (bioText.textContent.length < line.length) { bioText.textContent += line[bioText.textContent.length]; setTimeout(typeIn, 55); }
  else { setTimeout(deleteOut, 1800); }
}
function deleteOut() {
  if (bioText.textContent.length > 0) { bioText.textContent = bioText.textContent.slice(0, -1); setTimeout(deleteOut, 30); }
  else { phraseIndex = (phraseIndex + 1) % BIO_PHRASES.length; setTimeout(typeIn, 400); }
}

const enterScreen = document.getElementById('enter-screen');
const twEl = document.getElementById('enter-typewriter');
const TW_MSG = 'click to enter';
let twI = 0, twDir = 1, twPaused = false;

function runTypewriter() {
  if (twPaused) { twPaused = false; setTimeout(runTypewriter, 1800); return; }
  if (twDir === 1) {
    twEl.textContent = TW_MSG.slice(0, twI) + '|';
    twI++;
    if (twI > TW_MSG.length) { twPaused = true; runTypewriter(); }
    else setTimeout(runTypewriter, 80);
  } else {
    twEl.textContent = twI > 0 ? TW_MSG.slice(0, twI) + '|' : '';
    twI--;
    if (twI < 0) { twDir = 1; twI = 0; twPaused = true; runTypewriter(); }
    else setTimeout(runTypewriter, 40);
  }
}
runTypewriter();

const joinedEl = document.getElementById('joined-shuffle');
function randomJoinedText() {
  const n = Math.floor(Math.random() * 9999);
  return `${n} years ago`;
}
setInterval(() => { joinedEl.textContent = randomJoinedText(); }, 60);

enterScreen.addEventListener('click', () => {
  enterScreen.classList.add('hidden');
  setTimeout(() => {
    enterScreen.style.display = 'none';
    wrapper.classList.add('visible');
    typeUsername();
    setTimeout(typeIn, 700);
    audio.play().catch(() => {});
    setPlaying(true);
    fetchVisitCount();
  }, 800);
});

const MAX_TILT = 10;
let isHovering = false;
let curRX = 0, curRY = 0, targetRX = 0, targetRY = 0;
let tiltRAF = null;

function getAccentHex() { return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(); }

function applyShadow(rx, ry) {
  const sx = ry * 1.2, sy = -rx * 1.2;
  const a = getAccentHex();
  card.style.boxShadow = card.classList.contains('glow')
    ? `${sx}px ${sy + 20}px 60px #00000080, 0 0 60px ${a}28`
    : `${sx}px ${sy + 20}px 60px #00000080`;
}

function tiltLoop() {
  curRX += (targetRX - curRX) * 0.12;
  curRY += (targetRY - curRY) * 0.12;
  wrapper.style.transform = `rotateX(${curRX}deg) rotateY(${curRY}deg)`;
  applyShadow(curRX, curRY);
  if (isHovering || Math.abs(targetRX - curRX) > 0.01 || Math.abs(targetRY - curRY) > 0.01) {
    tiltRAF = requestAnimationFrame(tiltLoop);
  } else {
    tiltRAF = null;
  }
}

function startTiltLoop() {
  if (!tiltRAF) tiltRAF = requestAnimationFrame(tiltLoop);
}

function resetTilt() {
  targetRX = 0; targetRY = 0;
  startTiltLoop();
}

if (!isMobile) {
  wrapper.addEventListener('mouseenter', () => { isHovering = true; startTiltLoop(); });
  wrapper.addEventListener('mouseleave', () => { isHovering = false; resetTilt(); });
  wrapper.addEventListener('mousemove', (e) => {
    if (!isHovering) return;
    const rect = wrapper.getBoundingClientRect();
    const dx = (e.clientX - rect.left) / rect.width  - 0.5;
    const dy = (e.clientY - rect.top)  / rect.height - 0.5;
    targetRX = -dy * MAX_TILT * 2;
    targetRY = dx * MAX_TILT * 2;
  });
} else {
  let tiltTouchId = null, tiltStartX = 0, tiltStartY = 0, tiltActive = false;
  wrapper.addEventListener('touchstart', (e) => {
    if (e.target.closest('#sp-progress')) return;
    const t = e.changedTouches[0]; tiltTouchId = t.identifier; tiltStartX = t.clientX; tiltStartY = t.clientY; tiltActive = false;
    isHovering = true; startTiltLoop();
  }, { passive: true });
  wrapper.addEventListener('touchmove', (e) => {
    if (e.target.closest('#sp-progress')) return;
    let touch = null;
    for (let i = 0; i < e.changedTouches.length; i++) { if (e.changedTouches[i].identifier === tiltTouchId) { touch = e.changedTouches[i]; break; } }
    if (!touch) return;
    const dx = touch.clientX - tiltStartX, dy = touch.clientY - tiltStartY;
    if (!tiltActive && Math.abs(dx) > Math.abs(dy) + 5) tiltActive = true;
    if (!tiltActive) return;
    e.preventDefault();
    const rect = wrapper.getBoundingClientRect();
    const nx = (touch.clientX - rect.left) / rect.width  - 0.5;
    const ny = (touch.clientY - rect.top)  / rect.height - 0.5;
    targetRX = -ny * MAX_TILT * 1.4;
    targetRY = nx * MAX_TILT * 1.4;
  }, { passive: false });
  wrapper.addEventListener('touchend', () => { tiltTouchId = null; tiltActive = false; isHovering = false; resetTilt(); }, { passive: true });
  wrapper.addEventListener('touchcancel', () => { tiltTouchId = null; tiltActive = false; isHovering = false; resetTilt(); }, { passive: true });
}

function spawnSparks(cx, cy) {
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const accent2 = getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim();
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (Math.PI * 2 / 8) * i, dist = 30 + Math.random() * 45;
    s.style.left = cx + 'px'; s.style.top = cy + 'px';
    s.style.setProperty('--tx', `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`);
    s.style.background = i % 2 === 0 ? accent : accent2;
    s.style.animationDelay = (Math.random() * 0.1) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
}
document.addEventListener('click', (e) => spawnSparks(e.clientX, e.clientY));

if (!isMobile) {
  const dot = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  const TRAIL_COUNT = 12;
  const trail = [];
  let mx = window.innerWidth / 2, my = window.innerHeight / 2, rx2 = mx, ry2 = my;

  for (let i = 0; i < TRAIL_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'trail-dot';
    const t = 1 - i / TRAIL_COUNT, size = Math.round(8 * t);
    d.style.width = size + 'px'; d.style.height = size + 'px';
    d.style.opacity = (t * 0.6).toFixed(2);
    d.style.background = `hsl(0, 0%, ${Math.round(70 + i * 2)}%)`;
    d.style.boxShadow = `0 0 ${Math.round(6 * t)}px hsl(0, 0%, 80%)`;
    document.body.appendChild(d);
    trail.push({ el: d, x: 0, y: 0 });
  }

  document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });

  document.querySelectorAll('a, button, .icon-btn, .sp-progress, .vol-slider, .volume-ctrl').forEach(el => {
    el.addEventListener('mouseenter', () => { dot.style.width = '6px'; dot.style.height = '6px'; ring.style.width = '52px'; ring.style.height = '52px'; ring.style.borderColor = 'var(--accent)'; ring.style.boxShadow = '0 0 18px var(--a60)'; });
    el.addEventListener('mouseleave', () => { dot.style.width = '10px'; dot.style.height = '10px'; ring.style.width = '36px'; ring.style.height = '36px'; ring.style.borderColor = 'var(--a80)'; ring.style.boxShadow = '0 0 8px var(--a40)'; });
  });

  document.addEventListener('mousedown', () => { dot.style.transform = 'translate(-50%,-50%) scale(0.6)'; ring.style.transform = 'translate(-50%,-50%) scale(1.4)'; ring.style.opacity = '0.4'; });
  document.addEventListener('mouseup',   () => { dot.style.transform = 'translate(-50%,-50%) scale(1)';   ring.style.transform = 'translate(-50%,-50%) scale(1)';   ring.style.opacity = '1'; });

  let positions = Array(TRAIL_COUNT).fill(null).map(() => ({ x: mx, y: my }));
  function animateCursor() {
    rx2 += (mx - rx2) * 0.15; ry2 += (my - ry2) * 0.15;
    ring.style.left = rx2 + 'px'; ring.style.top = ry2 + 'px';
    positions.unshift({ x: mx, y: my });
    positions = positions.slice(0, TRAIL_COUNT);
    for (let i = 0; i < TRAIL_COUNT; i++) { const p = positions[Math.min(i, positions.length - 1)]; trail[i].el.style.left = p.x + 'px'; trail[i].el.style.top = p.y + 'px'; }
    requestAnimationFrame(animateCursor);
  }
  animateCursor();
}

if (isMobile) {
  const iconBtns = document.querySelectorAll('.icon-btn');

  document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const btn = el?.closest('.icon-btn');

    iconBtns.forEach(b => b.classList.remove('touch-hover'));
    if (btn) btn.classList.add('touch-hover');
  }, { passive: true });

  document.addEventListener('touchend', () => {
    iconBtns.forEach(b => b.classList.remove('touch-hover'));
  }, { passive: true });
}
</script>
